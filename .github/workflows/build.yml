name: Build Desktop App

on:
  push:
    branches: [main]

permissions:
  contents: write   # needed to create/update releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
            artifact: housefinder-linux
            archive_cmd: tar -czf housefinder-linux.tar.gz -C dist Housefinder
            archive_file: housefinder-linux.tar.gz

          - os: windows-latest
            name: windows
            artifact: housefinder-windows
            archive_cmd: Compress-Archive -Path dist\Housefinder -DestinationPath housefinder-windows.zip
            archive_file: housefinder-windows.zip

          - os: macos-latest
            name: macos
            artifact: housefinder-macos
            archive_cmd: tar -czf housefinder-macos.tar.gz -C dist Housefinder
            archive_file: housefinder-macos.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Linux system dependencies (GTK WebKit2 for pywebview) ────────────
      - name: Install Linux system dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.0 \
            libgtk-3-dev libwebkit2gtk-4.0-dev \
            libgirepository1.0-dev gcc libcairo2-dev pkg-config \
            upx-ucl

      # ── Windows: UPX for smaller binaries ────────────────────────────────
      - name: Install UPX (Windows)
        if: matrix.name == 'windows'
        run: choco install upx -y
        shell: pwsh

      # ── Python deps ───────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pywebview pyinstaller

      # ── Playwright browser (Chromium for Spitogatos DataDome bypass) ──────
      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller app.spec

      # ── Create data dir placeholder so fresh installs work ───────────────
      - name: Add data directory to dist
        shell: bash
        run: |
          mkdir -p dist/Housefinder/data/logs
          echo "[]" > dist/Housefinder/data/results.json
          echo "[]" > dist/Housefinder/data/results_spitogatos.json

      # ── Archive ───────────────────────────────────────────────────────────
      - name: Archive (Linux / Mac)
        if: matrix.name != 'windows'
        run: ${{ matrix.archive_cmd }}

      - name: Archive (Windows)
        if: matrix.name == 'windows'
        run: ${{ matrix.archive_cmd }}
        shell: pwsh

      # ── Upload workflow artifact ──────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive_file }}
          retention-days: 30

  # ── Create / update a rolling "Latest Build" release ──────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create or update Latest Build release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Latest Build"
          prerelease: true
          body: |
            Automated build from the latest `main` commit — `${{ github.sha }}`.

            > ⚠️ **Tested and working: Linux (Ubuntu 22.04+)** as of ${{ github.event.head_commit.timestamp }}.
            > Windows and macOS builds are provided as-is; community feedback welcome.

            ### Install (Linux)
            ```bash
            tar -xzf housefinder-linux.tar.gz
            cd Housefinder
            # First run — download the Spitogatos browser (one-time, ~150 MB)
            ./Housefinder --setup-browser   # or: python -m playwright install chromium
            # Launch the app
            ./Housefinder
            ```

            ### Install (Windows)
            Unzip `housefinder-windows.zip` and run `Housefinder.exe`.
            WebView2 (bundled with Edge) is required — already installed on Windows 10/11.

            ### Install (macOS)
            Unzip `housefinder-macos.tar.gz` and run `./Housefinder`.
            macOS may require: `xattr -cr ./Housefinder` to remove the quarantine flag.

            See [SETUP.md](https://github.com/${{ github.repository }}/blob/main/SETUP.md) for full instructions.
          files: |
            artifacts/housefinder-linux/housefinder-linux.tar.gz
            artifacts/housefinder-windows/housefinder-windows.zip
            artifacts/housefinder-macos/housefinder-macos.tar.gz
